name: Build and deploy Node.js app to Azure Web App - blanca-luxury-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install, build
        working-directory: ./api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          echo -e "[config]\nSCM_DO_BUILD_DURING_DEPLOYMENT=false" > .deployment

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D81E9A104FA64DA6A4DAA74B68DFF95D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9C97505BB46444C1B90204A4CA138E92 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5DCAE8FE85604E03B79854130061FBE6 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'blanca-luxury-api'
          slot-name: 'Production'
          package: .
