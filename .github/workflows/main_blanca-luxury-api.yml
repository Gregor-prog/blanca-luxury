name: Build and deploy Node.js app to Azure Web App - blanca-luxury-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deployment at a time — prevents the 409 Conflict from Azure's deployment lock.
concurrency:
  group: azure-deploy-api
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Build with pnpm
        working-directory: ./api
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - name: Install production dependencies (flat npm, no pnpm symlinks)
        working-directory: ./api
        env:
          PRISMA_CLI_BINARY_TARGETS: debian-openssl-3.0.x
        run: |
          rm -rf node_modules
          npm install --production

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            ./api/dist
            ./api/package.json
            ./api/prisma
            ./api/node_modules
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D81E9A104FA64DA6A4DAA74B68DFF95D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9C97505BB46444C1B90204A4CA138E92 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5DCAE8FE85604E03B79854130061FBE6 }}

      - name: Configure App Service
        run: |
          az webapp config appsettings set \
            --name blanca-luxury-api \
            --resource-group paralearn-uni-backend-ckgmceezhmcfekdk_group \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              PRISMA_CLI_BINARY_TARGETS=debian-openssl-3.0.x \
              WEBSITE_NODE_DEFAULT_VERSION=22.x
          az webapp config set \
            --name blanca-luxury-api \
            --resource-group paralearn-uni-backend-ckgmceezhmcfekdk_group \
            --startup-file "node_modules/.bin/prisma migrate deploy && node dist/main.js"

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'blanca-luxury-api'
          slot-name: 'Production'
          package: .
